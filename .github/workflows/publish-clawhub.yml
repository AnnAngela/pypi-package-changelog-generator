name: Publish ClawHub Skill

run-name: Publish ClawHub Skill ${{ (github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')) && (inputs.dry_run == 'true' && '(dry run)' || '(release)') || '(not release)' }}

on:
  pull_request:
  workflow_dispatch:
    inputs:
      version:
        description: Semver version to publish, for example 0.1.0
        required: false
      changelog:
        description: Release notes for ClawHub
        required: false
      dry_run:
        description: If true, will go through all steps except actually publishing to ClawHub
        required: false
        type: boolean
  push:
    branches:
      - master
    tags:
      - v*

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: 3.12
          cache: pip
          pip-version: 26

      - name: Install dependencies
        run: |
          python -m pip install -e .[dev]

      - name: Run tests
        run: pytest

      - name: Check CLI help
        run: python -m pypi_package_changelog_generator.cli --help

      - name: Build self-contained skill bundle
        id: bundle
        shell: bash
        run: |
          set -euo pipefail
          bundle_dir="$RUNNER_TEMP/pypi-package-changelog-generator"
          python scripts/build_skill_bundle.py --output "$bundle_dir"
          test -f "$bundle_dir/SKILL.md"
          echo "path=$bundle_dir" >> "$GITHUB_OUTPUT"
          cd $bundle_dir && tree -afh .

      - name: Check self-contained skill help
        run: python -S "${{ steps.bundle.outputs.path }}/scripts/invoke.py" --help

  publish:
    name: Publish to ClawHub ${{ inputs.dry_run == 'true' && '(dry run)' || '(release)' }}
    needs:
      - validate
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: 3.12
          cache: pip
          pip-version: 26
          pip-install: packaging

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Resolve version and changelog
        id: release
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            version="${GITHUB_REF_NAME#v}"
            changelog="Release ${version}"
            dry_run=false
          else
            version="${{ github.event.inputs.version }}"
            changelog="${{ github.event.inputs.changelog || '' }}"
            dry_run="${{ github.event.inputs.dry_run }}"
            if [[ -z "$version" ]]; then
              echo "workflow_dispatch requires a version input" >&2
              exit 1
            fi
            if [[ -z "$changelog" ]]; then
              changelog="Release ${version}"
            fi
          fi
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][A-Za-z0-9]+)*$ ]]; then
            echo "Version must be semver compatible: $version" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "changelog=$changelog" >> "$GITHUB_OUTPUT"
          echo "dry_run=$dry_run" >> "$GITHUB_OUTPUT"

      - name: Install ClawHub CLI
        run: npm install -g clawhub

      - name: Build self-contained skill bundle
        id: bundle
        shell: bash
        run: |
          set -euo pipefail
          bundle_dir="$RUNNER_TEMP/pypi-package-changelog-generator"
          python scripts/build_skill_bundle.py --output "$bundle_dir"
          echo "path=$bundle_dir" >> "$GITHUB_OUTPUT"
          cd $bundle_dir && tree -afh .

      - name: Authenticate ClawHub CLI
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          test -n "$CLAWHUB_TOKEN"
          clawhub login --token "$CLAWHUB_TOKEN"
          clawhub whoami --no-input

      - name: Publish skill
        shell: bash
        if: steps.release.outputs.dry_run != 'true'
        run: |
          clawhub skill publish "${{ steps.bundle.outputs.path }}" \
            --version "${{ steps.release.outputs.version }}" \
            --tags latest \
            --changelog "${{ steps.release.outputs.changelog }}" \
            --no-input
